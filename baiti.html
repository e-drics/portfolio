<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <title>Baiti</title>
</head>
<body>

<form id="forma">
  <p>Aprēķināt cik daudz informācijas var lejuplādēt</p>
  <input type="text" id="seconds" onfocus="forma.reset()" oninput="calculate()">
  sekundēs, ja interneta ātrums ir 25 Mbps.

  <p>Atbilde</p>
  <input type="text" id="result" readonly>
  <input type="radio" name="unit" value="KiB" onclick="calculate()"> KiB
  <input type="radio" name="unit" value="KB" checked onclick="calculate()"> KB
</form>

<script>
  function calculate() {
    const secs = parseFloat(document.getElementById('seconds').value);
    const unit = document.querySelector('input[name="unit"]:checked').value;
    const bytes = (secs * 25000000) / 8;
    document.getElementById('result').value = unit === 'KB' ? bytes / 1000 : bytes / 1024;
  }
</script>

</body>
</html>
